<!DOCTYPE html>
<html>
<head>
    <title>Drone Portfolio | Jdubz999</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            min-height: 100vh;
            margin: 0;
            /* Using the same epic mountain background as PC Builds */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 3rem; 
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap; /* Stacks them if the screen gets too small */
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .video-card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 25px; 
            flex: 1; 
            min-width: 350px; /* Keeps the video slots big */
            max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s ease;
            margin-bottom: 20px;
        }

        .video-card:hover { 
            transform: translateY(-10px); 
            border-color: #4db8ff; 
            box-shadow: 0 10px 30px rgba(77, 184, 255, 0.2);
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16 / 9; /* Perfect cinematic widescreen ratio */
            background: #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            border: 1px dashed #4db8ff;
            color: #4db8ff;
            font-weight: bold;
        }

        h3 { color: #4db8ff; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9rem; margin: 0; }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 25px; 
            text-decoration: none; 
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 40px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { 
            background: white; 
            color: #4db8ff; 
            box-shadow: 0 0 20px #4db8ff; 
        }
    </style>
</head>
<body>

    <h1>Drone Cinematography</h1>

    <div class="card-container">
        <div class="video-card">
            <div class="video-placeholder">Video Coming Soon</div>
            <h3>Mountain Range Pursuit</h3>
            <p>DJI Avata | 4K 60fps</p>
        </div>

        <div class="video-card">
            <div class="video-placeholder">Video Coming Soon</div>
            <h3>Urban FPV Flow</h3>
            <p>Custom 5" Quad | GoPro 12</p>
        </div>

        <div class="video-card">
            <div class="video-placeholder">Video Coming Soon</div>
            <h3>Sunset Coastline</h3>
            <p>Cinematic slow-shutter flight</p>
        </div>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
