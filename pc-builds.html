<!DOCTYPE html>
<html>
<head>
    <title>PC Builds | Jdubz999</title>
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px; 
            min-height: 100vh;
            margin: 0;
            /* Your epic mountain background */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 3rem; 
            margin-bottom: 40px;
        }

        /* This keeps them side-by-side like you liked it */
        .card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 25px; 
            display: inline-block; /* Magic line to keep them in a row */
            margin: 15px; 
            width: 300px; 
            vertical-align: top;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { 
            transform: translateY(-20px) scale(1.05); 
            border-color: #4db8ff; 
        }

        /* Keeps images uniform so they don't break the cards */
        .card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin-bottom: 15px; 
        }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 25px; 
            text-decoration: none; 
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 40px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { 
            background: white; 
            color: #4db8ff; 
            box-shadow: 0 0 20px #4db8ff; 
        }
    </style>
</head>
<body>

    <h1>Custom PC Builds</h1>

    <div class="card">
        <img src="graphics-card.jpg.jpeg">
        <h3>Graphics Card</h3>
        <p>High-performance rendering powerhouse.</p>
    </div>

    <div class="card">
        <img src="motherboard.jpg.jpeg">
        <h3>Motherboard</h3>
        <p>Gigabyte DDR4 - The heart of the build.</p>
    </div>

    <div class="card">
        <img src="pc1.jpg.jpeg">
        <h3>Full Setup</h3>
        <p>Completed workstation view.</p>
    </div>

    <div class="card">
        <img src="pc2.jpg.jpeg">
        <h3>Interior Detail</h3>
        <p>Cable management and airflow.</p>
    </div>

    <br>
    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
