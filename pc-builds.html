<!DOCTYPE html>
<html>
<head>
    <title>PC Builds | Jdubz999</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 3rem; 
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start; /* Keeps the tops of the cards aligned */
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            flex-wrap: wrap; /* Allows them to drop down on small screens */
        }

        .card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 15px; 
            border-radius: 20px; 
            width: 280px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s ease;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: #4db8ff; 
            box-shadow: 0 10px 30px rgba(77, 184, 255, 0.2);
        }

        /* SHOWS THE FULL IMAGE - NO CROPPING */
        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin-bottom: 15px; 
        }

        h3 { color: #4db8ff; font-size: 1.1rem; margin-bottom: 5px; }
        p { font-size: 0.85rem; color: #ccc; margin: 0; }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 25px; 
            text-decoration: none; 
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: white; color: #4db8ff; box-shadow: 0 0 20px #4db8ff; }
    </style>
</head>
<body>

    <h1>Custom PC Builds</h1>

    <div class="card-container">
        <div class="card">
            <img src="graphics-card.jpg.jpeg">
            <h3>Graphics Card</h3>
            <p>High-performance rendering powerhouse.</p>
        </div>

        <div class="card">
            <img src="motherboard.jpg.jpeg">
            <h3>Motherboard</h3>
            <p>Gigabyte DDR4 - The heart of the build.</p>
        </div>

        <div class="card">
            <img src="pc1.jpg.jpeg">
            <h3>Full Setup</h3>
            <p>Completed workstation view.</p>
        </div>

        <div class="card">
            <img src="pc2.jpg.jpeg">
            <h3>Interior Detail</h3>
            <p>Cable management and airflow.</p>
        </div>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
