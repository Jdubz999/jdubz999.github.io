<!DOCTYPE html>
<html>
<head>
    <title>PC Builds | Jdubz999</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 3rem; 
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: nowrap; /* Forces them to stay in a row on big screens */
            width: 95%;
            margin: 0 auto;
        }

        .card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 25px; 
            /* This is the change: let the card be wider for bigger pics */
            flex: 1; 
            min-width: 320px;
            max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s ease;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: #4db8ff; 
        }

        /* NO SHRINKING: This lets the image be as big as the card allows */
        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            display: block;
        }

        h3 { color: #4db8ff; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9rem; }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 25px; 
            text-decoration: none; 
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: white; color: #4db8ff; box-shadow: 0 0 20px #4db8ff; }

        /* Responsive fix for smaller screens so they don't get squished */
        @media (max-width: 1200px) {
            .card-container { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <h1>Custom PC Builds</h1>

    <div class="card-container">
        <div class="card">
            <img src="graphics-card.jpg.jpeg">
            <h3>Graphics Card</h3>
            <p>High-performance rendering powerhouse.</p>
        </div>

        <div class="card">
            <img src="motherboard.jpg.jpeg">
            <h3>Motherboard</h3>
            <p>Gigabyte DDR4 - The heart of the build.</p>
        </div>

        <div class="card">
            <img src="pc1.jpg.jpeg">
            <h3>Full Setup</h3>
            <p>Completed workstation view.</p>
        </div>

        <div class="card">
            <img src="pc2.jpg.jpeg">
            <h3>Interior Detail</h3>
            <p>Cable management and airflow.</p>
        </div>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
