<!DOCTYPE html>
<html>
<head>
    <title>PC Builds | Jdubz999</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px 20px 120px 20px; 
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 2.5rem; 
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 1300px;
            margin-bottom: 50px;
        }

        .card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 20px; 
            width: 300px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover { 
            transform: translateY(-15px); 
            border-color: #4db8ff; 
            box-shadow: 0 15px 30px rgba(77, 184, 255, 0.2);
        }

        /* THIS PART FORCES THE IMAGES TO LOOK UNIFORM */
        .card img { 
            width: 100%; 
            height: 220px;       /* This locks the height for every card */
            object-fit: cover;   /* This crops the photo so it doesn't stretch */
            object-position: center; 
            border-radius: 12px; 
            margin-bottom: 15px; 
        }

        h3 { margin: 10px 0 5px 0; color: #4db8ff; }
        p { margin: 0; color: #ccc; font-size: 0.9rem; }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 30px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            z-index: 10;
        }

        .btn:hover { 
            background: #fff; 
            color: #4db8ff; 
            box-shadow: 0 0 25px #4db8ff; 
        }
    </style>
</head>
<body>

    <h1>Custom PC Builds</h1>
    
    <div class="card-container">
        <div class="card">
            <img src="graphics-card.jpg.jpeg" alt="GPU">
            <h3>Graphics Card</h3>
            <p>High-performance rendering powerhouse.</p>
        </div>

        <div class="card">
            <img src="motherboard.jpg.jpeg" alt="Motherboard">
            <h3>Motherboard</h3>
            <p>Gigabyte DDR4 - The heart of the build.</p>
        </div>

        <div class="card">
            <img src="pc1.jpg.jpeg" alt="PC Build 1">
            <h3>Full Setup</h3>
            <p>Completed workstation view.</p>
        </div>

        <div class="card">
            <img src="pc2.jpg.jpeg" alt="PC Build 2">
            <h3>Interior Detail</h3>
            <p>Cable management and airflow optimization.</p>
        </div>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
