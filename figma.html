<!DOCTYPE html>
<html>
<head>
    <title>Figma Designs | Jdubz999</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: 'Helvetica', sans-serif; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #4db8ff; 
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.6); 
            font-size: 3rem; 
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .card { 
            background: rgba(30, 30, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 25px; 
            flex: 1; 
            min-width: 350px; 
            max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s ease;
            margin-bottom: 20px;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: #4db8ff; 
            box-shadow: 0 10px 30px rgba(77, 184, 255, 0.2);
        }

        /* Placeholder for when you add images later */
        .design-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #4db8ff;
            color: #4db8ff;
            font-weight: bold;
        }

        h3 { color: #4db8ff; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9rem; }

        .btn { 
            background: #4db8ff; 
            color: white; 
            padding: 14px 25px; 
            text-decoration: none; 
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: white; color: #4db8ff; box-shadow: 0 0 20px #4db8ff; }
    </style>
</head>
<body>

    <h1>UI/UX Figma Designs</h1>

    <div class="card-container">
        <div class="card">
            <div class="design-placeholder">Design Coming Soon</div>
            <h3>Project Title</h3>
            <p>Description of your design process and goals.</p>
        </div>

        <div class="card">
            <div class="design-placeholder">Design Coming Soon</div>
            <h3>Project Title</h3>
            <p>Description of your design process and goals.</p>
        </div>

        <div class="card">
            <div class="design-placeholder">Design Coming Soon</div>
            <h3>Project Title</h3>
            <p>Description of your design process and goals.</p>
        </div>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</body>
</html>
